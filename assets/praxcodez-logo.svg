<svg width="640" height="160" viewBox="0 0 640 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Praxcodez logo</title>
  <desc id="desc">Stylized PRAXCODEZ wordmark with cyan and magenta neon glow on transparent background.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="64" y1="24" x2="576" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#FF00FF"/>
    </linearGradient>
    <filter id="outerGlow" x="0" y="0" width="640" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="160" fill="none"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="url(#brandGradient)" font-family="Syncopate, Orbitron, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="4" filter="url(#outerGlow)">
    PRAXCODEZ
  </text>
</svg>
